name: Build & Release

# 触发条件：
# 1) 推送形如 v1.0.0 的 tag → 自动打包三平台并发布 Release
# 2) 在 Actions 页面手动触发（仅打包，不发布）
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # 发布 Release 需要写权限

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: PortMonitor-windows-x64.zip
            build_cmd: pyinstaller --clean --noconfirm PortMonitor.spec
            pack_cmd: powershell -Command "Compress-Archive -Path dist/PortMonitor.exe -DestinationPath PortMonitor-windows-x64.zip"
          - os: macos-latest
            asset_name: PortMonitor-macos-arm64.zip
            build_cmd: pyinstaller --clean --noconfirm PortMonitor.spec
            pack_cmd: cd dist && zip -r ../PortMonitor-macos-arm64.zip PortMonitor.app
          - os: macos-13
            asset_name: PortMonitor-macos-intel.zip
            build_cmd: pyinstaller --clean --noconfirm PortMonitor.spec
            pack_cmd: cd dist && zip -r ../PortMonitor-macos-intel.zip PortMonitor.app
          - os: ubuntu-latest
            asset_name: PortMonitor-linux-x64.tar.gz
            build_cmd: pyinstaller --clean --noconfirm PortMonitor.spec
            pack_cmd: cd dist && tar czf ../PortMonitor-linux-x64.tar.gz PortMonitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"      # 用稳定版避免 3.14 的边缘问题
          cache: pip

      # Linux 需要 Qt/PySide 的系统库；GitHub Actions 的 ubuntu-latest 已经比较全，
      # 但补上常见依赖可以避免打出的产物在其他 Linux 上缺库。
      - name: Install Linux system libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libdbus-1-3 \
            libfontconfig1 libxrender1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: ${{ matrix.build_cmd }}

      - name: Package artifact
        run: ${{ matrix.pack_cmd }}

      - name: Upload artifact (for workflow_dispatch preview)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## 下载对应你系统的版本

            | 系统 | 文件 | 说明 |
            |---|---|---|
            | Windows 10/11 (x64)      | `PortMonitor-windows-x64.zip`  | 解压后双击 `PortMonitor.exe` |
            | macOS (Apple Silicon)    | `PortMonitor-macos-arm64.zip`  | 解压后双击 `PortMonitor.app`；首次运行若被拦，右键 → 打开 |
            | macOS (Intel)            | `PortMonitor-macos-intel.zip`  | 同上 |
            | Linux (x64)              | `PortMonitor-linux-x64.tar.gz` | `tar xzf` 后 `./PortMonitor` 运行 |

            > 无需安装 Python 或任何依赖，双击即可运行。
            > 部分系统进程需管理员/root 权限才能扫描或停止。
